       UPPER HALF  (T1–T3 standalone + U1–U6 group)
       All have scale(1,−1) in SVG source → pads face inward
       Data flows LEFT → RIGHT
       ───────────────────────────────────────────────────── -->

  <!-- T1   7.5 cm   6 segs   y≈50 -->
  <rect x="217.5" y="47.5" width="150" height="5" rx="1" fill="#CC0000"/>
  <text x="74" y="52" text-anchor="end" font-family="monospace" font-size="8" fill="#aaaaaa">T1</text>
