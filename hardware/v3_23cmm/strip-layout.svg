<?xml version="1.0" encoding="UTF-8"?>
<svg width="720" height="560" viewBox="0 0 720 560" version="1.1"
     xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink">

  <title>Microsun – LED Strip Physical Layout</title>

  <!-- ── Background ── -->
  <rect width="720" height="560" fill="#1a1a1a"/>

  <!-- ── Title ── -->
  <text x="360" y="22" text-anchor="middle" font-family="monospace" font-size="13" fill="#cccccc" font-weight="bold">MICROSUN – LED Strip Physical Layout</text>
  <text x="360" y="37" text-anchor="middle" font-family="monospace" font-size="10" fill="#888888">Scale 1:1  (1 px = 0.5 mm)   WS2812B 12V, 160 LEDs/m, 2.7 mm wide, 9.34 mm row pitch  ·  604 LEDs total</text>

  <!-- ═══════════════════════════════════════
       STRIP ROWS
       x_svg  = (design_x − 11330) × 0.02 + 80
       y_svg  = (screen_y_center − 11337) × 0.02 + 50
       strip height drawn = 5 px (≈ 2.5 mm visual)
       scale = 2 SVG px / mm  →  1 cm = 20 px
       ═══════════════════════════════════════ -->

  <!-- ── Section label: UPPER HALF (inverted strips) ── -->
  <line x1="62" y1="50" x2="62" y2="203" stroke="#555" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="58" y="130" text-anchor="middle" font-family="monospace" font-size="9" fill="#888" transform="rotate(-90,58,130)">UPPER HALF  (pads face center)</text>

  <!-- ── Section label: LOWER HALF ── -->
  <line x1="62" y1="230" x2="62" y2="459" stroke="#555" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="58" y="348" text-anchor="middle" font-family="monospace" font-size="9" fill="#888" transform="rotate(-90,58,348)">LOWER HALF  (pads face center)</text>

  <!-- ── Gap annotation ── -->
  <line x1="80" y1="207" x2="505" y2="207" stroke="#444" stroke-width="0.5" stroke-dasharray="4,4"/>
  <line x1="80" y1="229" x2="505" y2="229" stroke="#444" stroke-width="0.5" stroke-dasharray="4,4"/>
  <rect x="548" y="211" width="125" height="14" rx="2" fill="#2a2a00" stroke="#666633" stroke-width="0.5"/>
  <text x="610" y="221" text-anchor="middle" font-family="monospace" font-size="8.5" fill="#bbbb44">CONNECTION ZONE  ~8 mm</text>

